<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Registration</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-label="Registration form">
        <div class="hero-art" aria-hidden="true">
          <div class="ticket">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="signup-panel">
          <p class="eyebrow">Registration</p>
          <h1>Event Registration</h1>
          <p class="intro">Submit your name and phone number. Registration records are stored in a private data repository.</p>

          <form id="signupForm" novalidate>
            <label>
              <span>Name</span>
              <input id="name" name="name" type="text" autocomplete="name" required maxlength="40" placeholder="Enter your name">
            </label>

            <label>
              <span>Phone number</span>
              <input id="phone" name="phone" type="tel" autocomplete="tel" required maxlength="24" placeholder="Enter your phone number">
            </label>

            <label class="website-field" aria-hidden="true">
              <span>Website</span>
              <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
            </label>

            <p id="message" class="message" role="status" aria-live="polite"></p>

            <button id="submitButton" type="submit">Submit registration</button>
          </form>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
